let activeCard = null;

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="highlight">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
}

function speak(name) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(name);
    u.rate = 0.8;
    window.speechSynthesis.speak(u);
  }
}

function openCard(i) {
  if (activeCard !== null && activeCard !== i) {
    const prev = document.getElementById('card-' + activeCard);
    const prevPron = document.getElementById('pron-' + activeCard);
    if (prev) prev.classList.remove('active');
    if (prevPron) prevPron.classList.remove('show');
  }
  const card = document.getElementById('card-' + i);
  const pron = document.getElementById('pron-' + i);
  if (card) card.classList.add('active');
  if (pron) pron.classList.add('show');
  activeCard = i;
}

function toggle(i) {
  const card = document.getElementById('card-' + i);
  const pron = document.getElementById('pron-' + i);
  if (card.classList.contains('active')) {
    card.classList.remove('active');
    pron.classList.remove('show');
    activeCard = null;
  } else {
    openCard(i);
  }
}

function render(query) {
  const q = query.trim().toLowerCase();
  const filtered = q ? names.filter(n => n.name.toLowerCase().includes(q) || n.origin.toLowerCase().includes(q)) : [];
  const countEl = document.getElementById('count');
  const resultsEl = document.getElementById('results');

  if (!q) {
    countEl.textContent = '';
    resultsEl.innerHTML = '<div class="empty">Start typing to search ' + names.length + ' names</div>';
    activeCard = null;
    return;
  }

  if (filtered.length === 0) {
    countEl.textContent = '';
    resultsEl.innerHTML = '<div class="empty">No names found for "' + q + '"</div>';
    activeCard = null;
    return;
  }

  countEl.textContent = filtered.length + ' result' + (filtered.length !== 1 ? 's' : '');

  resultsEl.innerHTML = filtered.map((n, i) => `
    <div class="card" id="card-${i}" onclick="toggle(${i})">
      <div class="card-header">
        <span class="name-text">${highlight(n.name, query.trim())}</span>
      </div>
      <div class="pronunciation" id="pron-${i}">
        <div class="syllables">${n.syllables.map(s => `<span>${s}</span>`).join('')}</div>
        <button class="speak-btn" onclick="event.stopPropagation(); speak('${n.name}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
          Hear it
        </button>
      </div>
    </div>
  `).join('');

  activeCard = null;
  openCard(0);
}

const input = document.getElementById('search');
input.addEventListener('input', () => render(input.value));
render('');
